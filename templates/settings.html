<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Account Settings</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>

  <div class="wrapper">
    <h1><i class="fas fa-cog"></i> Account Settings</h1>

    <form action="{{ url_for('settings') }}" method="POST">
      <div class="input-box">
        <i class="fas fa-user"></i>
        <input type="text" name="username" placeholder="Enter Name" value="{{ user.name }}" required>
      </div>

      <div class="input-box">
        <i class="fas fa-envelope"></i>
        <input type="email" name="email" placeholder="Email Address" value="{{ user.email }}" required>
      </div>

      <div class="input-box">
        <i class="fas fa-lock"></i>
        <input type="password" name="password" placeholder="New Password (optional)">
      </div>

      <button type="submit" class="btn">💾 Save Changes</button><br/><br/>
      <a href="{{ url_for('dashboard') }}" class="btn">Cancel</a>
    </form>
  </div>

</body>
</html>
